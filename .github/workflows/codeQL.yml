name: "Code Scanning - Action"

on:
  pull_request:
    branches: [main]

jobs:
  CodeQL-Build:
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v1
        with:
          languages: javascript # Replace with your actual language, or set up a matrix
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v1
      # Replaced deprecated @v1 actions with modern @v3 and @v4 versions
      # Fixed YAML indentation under the "with:" block
      # Removed the broken matrix variable or defined a hardcoded language
